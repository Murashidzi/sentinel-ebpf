name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev

      - name: Verify clang
        run: clang --version

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: '1.22'
          cache-dependency-path: daemon/go.sum

      - name: Verify Go
        run: go version

      - name: Run Go vet on daemon
        run: cd daemon && go vet ./...

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'

      - name: Install Python linter
        run: pip install pylint

      - name: Lint Python ML code
        run: |
          if find ml -name "*.py" | grep -q .; then
            pylint ml/*.py --disable=C,R || true
          else
            echo "No Python ML files yet — skipping lint"
          fi

      - name: Compile eBPF kernel object
        run: |
          if [ -f kernel/tracer.bpf.c ]; then
            echo "vmlinux.h present: $(wc -l < kernel/vmlinux.h) lines"
            echo "Compiling kernel/tracer.bpf.c..."
            clang -O2 -g -target bpf -D__TARGET_ARCH_x86 \
              -c kernel/tracer.bpf.c -o kernel/tracer.bpf.o
            echo "Compilation successful: $(ls -lh kernel/tracer.bpf.o)"
          else
            echo "kernel/tracer.bpf.c not yet written — skipping"
          fi
