name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Check clang version
        run: clang --version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python linting
        run: pip install pylint

      - name: Lint Python (when files exist)
        run: |
          if find ml -name "*.py" | grep -q .; then
            pylint ml/*.py --disable=C,R || true
          else
            echo "No Python files yet - skipping lint"
          fi
